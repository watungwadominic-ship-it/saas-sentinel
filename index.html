<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Sentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: { accent: '#f08924', bg: '#d6d3cb', sidebar: '#6d6a63' }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg: #d6d3cb;
        --color-sidebar-bg: #6d6a63;
        --color-accent: #f08924;
      }
      body { background-color: var(--color-bg); font-family: 'Inter', sans-serif; }
      .glass-card { 
        background: rgba(255, 255, 255, 0.4); 
        backdrop-filter: blur(20px); 
        border: 1px solid rgba(255, 255, 255, 0.2); 
        border-radius: 24px; 
      }
    </style>
  </head>
  <body>
    <div id="root" class="min-h-screen flex flex-col lg:flex-row">
      <aside class="w-72 bg-[#6d6a63] text-white hidden lg:flex flex-col p-8 fixed h-full">
        <div class="flex items-center gap-3 mb-12">
          <div class="bg-[#f08924] p-2 rounded-lg">📰</div>
          <h1 class="text-xl font-bold">SaaS Sentinel</h1>
        </div>
        <nav class="space-y-4">
          <div class="font-bold text-orange-400">📈 Feed</div>
          <div class="opacity-60 hover:opacity-100 cursor-pointer">📊 Analysis</div>
        </nav>
      </aside>

      <main class="flex-1 lg:ml-72 p-12">
        <div class="max-w-5xl mx-auto">
          <div class="mb-10 bg-white/30 backdrop-blur-md p-4 rounded-2xl flex items-center border border-white/20">
            <span class="mr-4 opacity-30">🔍</span>
            <input type="text" id="searchInput" placeholder="Search Intelligence..." class="bg-transparent w-full outline-none font-medium">
          </div>

          <h2 class="text-2xl font-black mb-8">Intelligence Feed</h2>
          
          <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
             <div id="loading" class="col-span-full py-20 text-center opacity-40 font-bold uppercase tracking-widest text-xs">
                Sourcing Intelligence...
             </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

      // 1. FILL THESE IN
      const supabaseUrl = 'YOUR_SUPABASE_URL'
      const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'
      const supabase = createClient(supabaseUrl, supabaseKey)

      async function loadNews() {
        const { data, error } = await supabase
          .from('news_articles')
          .select('*')
          .order('created_at', { ascending: false });

        const grid = document.getElementById('news-grid');
        const loading = document.getElementById('loading');

        if (error) {
          grid.innerHTML = `<div class="text-red-500 font-bold">Connection Failed: Check Credentials</div>`;
          return;
        }

        loading.style.display = 'none';
        grid.innerHTML = data.map(article => `
          <div class="glass-card p-6 hover:-translate-y-1 transition-all cursor-pointer">
            <img src="${article.image_url || 'https://via.placeholder.com/400x200'}" class="w-full h-40 object-cover rounded-xl mb-4">
            <h3 class="font-bold text-lg mb-2">${article.title}</h3>
            <p class="text-xs opacity-70 italic line-clamp-3">"${article.summary}"</p>
          </div>
        `).join('');
      }

      loadNews();
    </script>
  </body>
</html>
