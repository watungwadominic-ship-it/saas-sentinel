<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Sentinel | Executive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f7f4; color: #1a1a1a; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .executive-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-6">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-600 tracking-tight text-graphite">SAAS <span class="text-orange-500">SENTINEL</span></h1>
            <p class="text-sm text-gray-500">Curated Intelligence for B2B Founders</p>
        </div>
    </header>

    <main id="news-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        </main>

    <div id="article-modal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass executive-shadow w-full max-w-2xl rounded-3xl overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-white/50 p-2 rounded-full hover:bg-white transition">✕</button>
            
            <img id="modal-image" class="w-full h-64 object-cover" src="" alt="">
            
            <div class="p-8">
                <h2 id="modal-title" class="text-2xl font-semibold mb-4 leading-tight"></h2>
                
                <div class="mb-6">
                    <h4 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-2">The Analysis</h4>
                    <p id="modal-content" class="text-gray-700 leading-relaxed text-sm"></p>
                </div>

                <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Sentinel's Take</h4>
                    <div id="modal-breakdown">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "YOUR_SUPABASE_URL";
        const SB_KEY = "YOUR_SUPABASE_KEY";
        let articlesData = [];

        async function fetchNews() {
            const res = await fetch(`${SB_URL}/rest/v1/news_articles?select=*&order=created_at.desc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            articlesData = await res.json();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = articlesData.map((art, i) => `
                <div onclick="openModal(${i})" class="glass rounded-2xl p-4 cursor-pointer hover:scale-[1.02] transition-transform duration-300">
                    <img src="${art.image_url}" class="w-full h-40 object-cover rounded-xl mb-4">
                    <span class="text-[10px] font-bold text-orange-500 uppercase">${art.category}</span>
                    <h3 class="font-semibold text-lg mt-1 leading-tight">${art.title}</h3>
                </div>
            `).join('');
        }

        function openModal(index) {
            const art = articlesData[index];
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-image').src = art.image_url;
            document.getElementById('modal-content').innerText = art.content;

            // Safe Parse Logic to handle the "JSON in text" issue
            let points = [];
            try {
                points = typeof art.breakdown === 'string' ? JSON.parse(art.breakdown) : art.breakdown;
                if (!Array.isArray(points)) points = Object.values(points)[0]; // Fallback for nested JSON
            } catch (e) { points = ["Analysis pending..."]; }

            const listHtml = points.map(p => `
                <div class="flex items-start mb-3">
                    <span class="text-orange-500 mr-2">•</span>
                    <p class="text-sm text-gray-600 italic font-medium">"${p}"</p>
                </div>
            `).join('');

            document.getElementById('modal-breakdown').innerHTML = listHtml;
            document.getElementById('article-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('article-modal').classList.add('hidden');
        }

        fetchNews();
    </script>
</body>
</html>
