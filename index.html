<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Sentinel | Executive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f2ee; color: #1a1a1a; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .tab-active { color: #f97316; border-bottom: 2px solid #f97316; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-6 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 flex flex-col md:flex-row items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter uppercase text-gray-900">SAAS <span class="text-orange-600">SENTINEL</span></h1>
            <p class="text-gray-500 text-sm">Executive Market Intelligence</p>
        </div>
        <nav class="flex gap-8 border-b border-gray-200 w-full md:w-auto">
            <button id="tab-feed" onclick="switchTab('feed')" class="pb-2 text-sm font-bold uppercase tracking-widest tab-active transition-all">Radar</button>
            <button id="tab-analysis" onclick="switchTab('analysis')" class="pb-2 text-sm font-bold uppercase tracking-widest text-gray-400 hover:text-gray-600 transition-all">Analysis</button>
        </nav>
    </header>

    <main id="news-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8"></main>

    <div id="article-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-3xl rounded-[2.5rem] overflow-hidden relative max-h-[90vh] flex flex-col shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-20 bg-white/90 p-3 rounded-full hover:scale-110 transition">✕</button>
            <div class="overflow-y-auto">
                <img id="modal-image" class="w-full h-72 object-cover" src="" alt="">
                <div class="p-8 md:p-12">
                    <h2 id="modal-title" class="text-3xl font-bold mb-8 leading-tight"></h2>
                    <div class="bg-gray-900/5 rounded-3xl p-6 mb-8 border border-gray-200/60">
                        <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Strategic Takeaways</h4>
                        <div id="modal-breakdown" class="space-y-4"></div>
                    </div>
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Deep Analysis</h4>
                    <p id="modal-content" class="text-gray-700 leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "YOUR_SUPABASE_URL";
        const SB_KEY = "YOUR_SUPABASE_KEY";
        let articlesData = [];
        let currentTab = 'feed';

        async function fetchNews() {
            const res = await fetch(`${SB_URL}/rest/v1/news_articles?select=*&order=created_at.desc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            articlesData = await res.json();
            renderContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-feed').className = tab === 'feed' ? 'pb-2 text-sm font-bold tracking-widest tab-active' : 'pb-2 text-sm font-bold tracking-widest text-gray-400';
            document.getElementById('tab-analysis').className = tab === 'analysis' ? 'pb-2 text-sm font-bold tracking-widest tab-active' : 'pb-2 text-sm font-bold tracking-widest text-gray-400';
            renderContent();
        }

        function renderContent() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = articlesData.map((art, i) => `
                <div onclick="openModal(${i})" class="glass rounded-3xl p-5 cursor-pointer hover:translate-y-[-4px] transition-all duration-300">
                    <img src="${art.image_url}" class="w-full h-40 object-cover rounded-2xl mb-4">
                    <h3 class="font-bold text-lg leading-tight mb-2">${art.title}</h3>
                    <p class="text-xs text-gray-500 italic line-clamp-2">
                        ${currentTab === 'feed' ? art.summary : art.content}
                    </p>
                </div>
            `).join('');
        }

        function openModal(index) {
            const art = articlesData[index];
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-image').src = art.image_url;
            document.getElementById('modal-content').innerText = art.content;

            let points = typeof art.breakdown === 'string' ? JSON.parse(art.breakdown) : art.breakdown;
            document.getElementById('modal-breakdown').innerHTML = points.map(p => `
                <div class="flex items-start"><div class="h-1.5 w-1.5 rounded-full bg-orange-500 mt-1.5 mr-3"></div>
                <p class="text-sm font-semibold italic">"${p}"</p></div>
            `).join('');

            document.getElementById('article-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('article-modal').classList.add('hidden'); }
        fetchNews();
    </script>
</body>
</html>
