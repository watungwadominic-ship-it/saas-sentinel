name: Weekly Intelligence Newsletter
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsletter API
        run: |
          RAW_URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$RAW_URL" ]; then
            RAW_URL="https://saas-sentinel-cyan.vercel.app"
          fi
          # Trim all whitespaces, newlines, and carriage returns
          URL=$(echo "$RAW_URL" | xargs | tr -d '[:space:]')
          # Remove trailing slash if present
          URL="${URL%/}"
          
          echo "Connecting to SaaS Sentinel Dispatcher at $URL..."
          RESPONSE=$(curl -s -S -X POST "$URL/api/cron/weekly-newsletter" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          # Print raw response for debugging in case of any issues
          echo "Debug RAW Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "--------------------------------------------------------"
            echo "🚀  SaaS Sentinel Automated Newsletter Bot  🚀"
            echo "--------------------------------------------------------"
            echo "🟢  Weekly Newsletter Dispatch Completed!"
            
            # Extract response details safely
            SENT=$(echo "$RESPONSE" | grep -o '"sent":[0-9]*' | cut -d: -f2 || echo "0")
            FALLBACK=$(echo "$RESPONSE" | grep -o '"fallback":[^,}]*' | cut -d: -f2 || echo "false")
            DB_STATUS=$(echo "$RESPONSE" | grep -o '"dbStatus":"[^"]*' | cut -d'"' -f4 || echo "unknown")
            DB_MSG=$(echo "$RESPONSE" | grep -o '"dbMessage":"[^"]*' | cut -d'"' -f4 || echo "")
            SMTP_OK=$(echo "$RESPONSE" | grep -o '"smtpConfigured":[^,}]*' | cut -d: -f2 || echo "true")
            ACTUAL_COUNT=$(echo "$RESPONSE" | grep -o '"actualDbCount":[0-9]*' | cut -d: -f2 || echo "0")
            SUBSCRIBERS_LEN=$(echo "$RESPONSE" | grep -o '"subscribersQueryLength":[^,}]*' | cut -d: -f2 || echo "null")
            ERRORS=$(echo "$RESPONSE" | grep -o '"errors":\[[^]]*\]' || echo "")
            
            echo "📧  Email Dispatch Metrics:"
            echo "    -> Successfully Dispatched emails: $SENT"
            echo "    -> Fallback mode activated: $FALLBACK"
            echo "    -> Table rows in DB metadata: $ACTUAL_COUNT rows"
            echo "    -> Subscribers successfully read via current api key: $SUBSCRIBERS_LEN"
            echo ""
            echo "📋  System Status:"
            echo "    -> Database connection status: $DB_STATUS $DB_MSG"
            
            if [ "$SMTP_OK" = "false" ]; then
              echo "    -> SMTP STATUS: 🔴 NOT CONFIGURING SMTP (SMTP_USER/SMTP_PASS are missing in your Vercel Dashboard env!)"
            else
              echo "    -> SMTP STATUS: 🟢 SMTP Configuration Present"
            fi
            
            if [ ! -z "$ERRORS" ] && [ "$ERRORS" != "[]" ]; then
              echo ""
              echo "⚠️   Delivery Warning Logs:"
              echo "    $ERRORS"
            fi
            
            if [ "$SUBSCRIBERS_LEN" = "0" ] && [ "$ACTUAL_COUNT" -gt 0 ]; then
              echo ""
              echo "💡  IMPORTANT SECURITY/RLS WARNING:"
              echo "    Your database metadata registers $ACTUAL_COUNT subscribers, but the query fetched 0 list items."
              echo "    This occurs because your Vercel environment is using the public anon key with Row Level Security (RLS) enabled."
              echo "    To resolve this, add 'SUPABASE_SERVICE_ROLE_KEY' to your Vercel Dashboard Environment Variables"
              echo "    under the name 'SUPABASE_SERVICE_ROLE_KEY' (or override 'SUPABASE_KEY' with your service_role secret key)."
            fi
            echo "--------------------------------------------------------"
          else
            echo "🔴  Newsletter Bot reported a failure response:"
            echo "$RESPONSE"
            exit 1
          fi
