name: Weekly Intelligence Newsletter
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsletter API
        run: |
          RAW_URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$RAW_URL" ]; then
            RAW_URL="https://saas-sentinel-cyan.vercel.app"
          fi
          # Trim all whitespaces, newlines, and carriage returns
          URL=$(echo "$RAW_URL" | xargs | tr -d '[:space:]')
          # Remove trailing slash if present
          URL="${URL%/}"
          
          echo "Triggering newsletter at $URL/api/cron/weekly-newsletter"
          curl -X POST "$URL/api/cron/weekly-newsletter" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f
