name: Weekly Intelligence Newsletter
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsletter API
        run: |
          RAW_URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$RAW_URL" ]; then
            RAW_URL="https://saas-sentinel-cyan.vercel.app"
          fi
          # Trim all whitespaces, newlines, and carriage returns
          URL=$(echo "$RAW_URL" | xargs | tr -d '[:space:]')
          # Remove trailing slash if present
          URL="${URL%/}"
          
          echo "Connecting to SaaS Sentinel Dispatcher at $URL..."
          RESPONSE=$(curl -s -S -X POST "$URL/api/cron/weekly-newsletter" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "--------------------------------------------------------"
            echo "🚀  SaaS Sentinel Automated Newsletter Bot  🚀"
            echo "--------------------------------------------------------"
            echo "🟢  Weekly Newsletter Dispatched Successfully!"
            
            # Extract and display clean response details safely
            SENT=$(echo "$RESPONSE" | grep -o '"sent":[0-9]*' | cut -d: -f2 || echo "0")
            FALLBACK=$(echo "$RESPONSE" | grep -o '"fallback":[^,}]*' | cut -d: -f2 || echo "false")
            
            echo "📧  Subscribers notified: $SENT"
            if [ "$FALLBACK" = "true" ]; then
              echo "📢  No external subscribers found. Dispatched master preview copy successfully."
            fi
            echo "--------------------------------------------------------"
          else
            echo "🔴  Newsletter Bot reported an error:"
            echo "$RESPONSE"
            exit 1
          fi
