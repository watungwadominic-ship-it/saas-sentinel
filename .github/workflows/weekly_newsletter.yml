name: Weekly Intelligence Newsletter
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsletter API
        run: |
          URL="${{ secrets.SHARED_APP_URL || 'https://ais-pre-k2zyhx7iw4f2x55hvxwlzg-10310046101.europe-west2.run.app' }}"
          echo "Triggering newsletter at $URL/api/cron/weekly-newsletter"
          curl -X POST "$URL/api/cron/weekly-newsletter" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f
