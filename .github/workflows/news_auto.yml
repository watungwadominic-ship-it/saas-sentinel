name: News Auto
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  run-intel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r python/requirements.txt
      - name: Run Bot
        env:
          APP_URL: ${{ secrets.SHARED_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python python/bot_engine.py
