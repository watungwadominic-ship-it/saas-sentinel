name: SaaS Sentinel Newsroom

on:
  schedule:
    # Runs every 12 hours (12:00 and 00:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows you to run it manually

jobs:
  write_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Prep Python scripts
        run: |
          mv .github/python_intel/bot_engine.py.stashed .github/python_intel/bot_engine.py
          mv .github/python_intel/newsletter.py.stashed .github/python_intel/newsletter.py

      - name: Install dependencies
        run: pip install -r .github/python_intel/deps.txt

      - name: Run News Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          SHARED_APP_URL: ${{ secrets.SHARED_APP_URL }}
        run: python .github/python_intel/bot_engine.py
